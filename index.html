// Safe localStorage wrappers — fail silently if storage is disabled
// (some corporate devices, private browsing, etc.).
const LS_RATINGS = 'lfhs_brief_ratings_v1';
const LS_BOOKMARKS = 'lfhs_brief_bookmarks_v1';

function lsGet(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* noop */ }
}

// Stable ID for an insight within a brief. Enables rating lookups.
const insightId = (weekId, verticalId, idx) => `${weekId}::${verticalId}::${idx}`;

// Build a full snapshot of an insight for bookmarks. Snapshots let
// bookmarks survive even if the original brief rotates out of archive.
const buildBookmarkSnapshot = (brief, verticalId, idx, insight) => {
  const meta = VERTICALS_META.find(v => v.id === verticalId);
  return {
    id: insightId(brief.id, verticalId, idx),
    weekId: brief.id,
    weekShort: brief.weekShort,
    weekIssue: brief.issue,
    verticalId,
    verticalName: meta ? meta.name : verticalId,
    verticalAbbr: meta ? meta.abbr : '',
    headline: insight.headline,
    context: insight.context,
    tags: insight.tags,
    implication: insight.implication,
    conversation: insight.conversation,
    source: insight.source,
    sourceUrl: insight.sourceUrl,
    savedAt: Date.now(),
  };
};

// Plausible custom event helper — fires only when Plausible script loaded; no-op otherwise
const trackEvent = (name, props) => {
  try { if (typeof window !== 'undefined' && window.plausible) window.plausible(name, { props }); } catch (e) { /* noop */ }
};

function InsightTile({ insight, insightIdStr, bookmarked, rating, onBookmark, onRate, weekBadge, onUnsave }) {
  const [flipped, setFlipped] = useState(false);
  const toggleFlip = (e) => {
    if (e) e.stopPropagation();
    setFlipped(f => {
      const next = !f;
      // Track flip-open events (not flip-close) to measure read-through intent
      if (next) trackEvent('Tile Flip', { headline: insight.headline.slice(0, 80), vertical: insightIdStr.split('::')[1] || 'unknown' });
      return next;
    });
  };
  const openSource = (e) => {
    e.stopPropagation();
    trackEvent('Source Click', { headline: insight.headline.slice(0, 80), source: insight.source || 'unknown' });
    window.open(insight.sourceUrl, '_blank', 'noopener,noreferrer');
  };
  const handleBookmark = (e) => {
    e.stopPropagation();
    trackEvent(bookmarked ? 'Bookmark Remove' : 'Bookmark Add', { headline: insight.headline.slice(0, 80), vertical: insightIdStr.split('::')[1] || 'unknown' });
    if (onBookmark) onBookmark(insightIdStr);
  };
  const handleRate = (e, value) => {
    e.stopPropagation();
    trackEvent(value === 'up' ? 'Rated Useful' : 'Rated Not Useful', { headline: insight.headline.slice(0, 80), vertical: insightIdStr.split('::')[1] || 'unknown' });
    if (onRate) onRate(insightIdStr, value);
  };
  const handleUnsave = (e) => {
    e.stopPropagation();
    trackEvent('Bookmark Remove', { headline: insight.headline.slice(0, 80), source: 'saved-view' });
    if (onUnsave) onUnsave(insightIdStr);
  };

  const isBookmarked = !!bookmarked;
  const ratingValue = rating || null;

  return (
    <div className="tile-outer" onClick={() => setFlipped(f => !f)}>
      <div className="tile-inner" style={{ transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
        {/* FRONT */}
        <div className="tile-face tile-front" style={{
          background: C.surface, border: `1px solid ${C.border}`,
          borderTop: `3px solid ${C.red}`, borderRadius: 8,
          padding: '16px 18px 14px',
          display: 'flex', flexDirection: 'column', gap: 10,
          boxShadow: '0 1px 2px rgba(20,21,26,0.04)',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', flex: 1 }}>
              {weekBadge && (
                <span style={{
                  display: 'inline-flex', alignItems: 'center',
                  padding: '3px 8px', fontSize: 9.5, fontWeight: 700,
                  letterSpacing: '0.06em', textTransform: 'uppercase',
                  color: C.inkSoft, background: C.surfaceAlt,
                  border: `1px solid ${C.border}`, borderRadius: 4,
                }}>{weekBadge}</span>
              )}
              {insight.tags.map((t, i) => <Tag key={i} label={t} />)}
            </div>
            <button onClick={handleBookmark} title={isBookmarked ? 'Remove from saved' : 'Save this insight'}
              className="no-print icon-btn"
              style={{
                flexShrink: 0, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                width: 28, height: 28, padding: 0,
                background: isBookmarked ? C.redWash : 'transparent',
                color: isBookmarked ? C.redInk : C.mute,
                border: `1px solid ${isBookmarked ? C.redBorder : 'transparent'}`,
                borderRadius: 6, cursor: 'pointer', transition: 'all 0.15s',
              }}>
              <Bookmark size={14} strokeWidth={2}
                fill={isBookmarked ? C.redInk : 'none'}
                color={isBookmarked ? C.redInk : C.mute} />
            </button>
          </div>
          <h3 className="tile-headline" style={{
            margin: 0, fontSize: 15.5, lineHeight: 1.35, fontWeight: 700,
            color: C.ink, letterSpacing: '-0.005em',
          }}>{insight.headline}</h3>
          <p className="tile-context" style={{
            margin: 0, fontSize: 12.5, lineHeight: 1.55, color: C.inkBody,
            flex: '0 0 auto',
          }}>{insight.context}</p>
          <div style={{
            fontSize: 10.5, color: C.mute, fontStyle: 'italic',
            paddingTop: 8, borderTop: `1px solid ${C.border}`,
            marginTop: 'auto',
          }}>
            {insight.source}
          </div>
          <TileButtons onFlip={toggleFlip} onArticle={openSource} />
          {onUnsave && (
            <button onClick={handleUnsave}
              className="no-print"
              style={{
                marginTop: 4, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 5,
                padding: '7px 10px', fontSize: 10.5, fontWeight: 600, letterSpacing: '0.04em',

          background: C.surface, border: `1px solid ${C.border}`,

              {insight.implication}

            background: C.redWash, border: `1px solid ${C.redBorder}`,

}

// -------------------- MAIN --------------------
function IntelBrief() {
  const [selectedId, setSelectedId] = useState(BRIEFS[0].id);
  const [filter, setFilter] = useState('all');
  const [weekPickerOpen, setWeekPickerOpen] = useState(false);
  const [regionPickerOpen, setRegionPickerOpen] = useState(false);
  const [langBannerDismissed, setLangBannerDismissed] = useState(true); // default true; effect below sets to false if banner should show

  // -------- Language-detection nudge --------
  // On first visit, if browser language matches another region but the user is on this one,
  // surface a one-time banner suggesting the regional dashboard. Stored in localStorage so
  // the banner does not reappear after dismissal.
  const [suggestedRegion, setSuggestedRegion] = useState(null);
  useEffect(() => {
    try {
      if (typeof navigator === 'undefined') return;
      const dismissed = lsGet('lfhs_lang_banner_dismissed_v1', false);
      if (dismissed) return;
      const browserLang = (navigator.language || navigator.userLanguage || '').toString();
      if (!browserLang) return;
      // Find any OTHER region whose languageMatches contains this browser language
      const match = REGIONS.find(r => r.id !== REGION && r.languageMatches.some(l => browserLang.startsWith(l)));
      if (match) {
        setSuggestedRegion(match);
        setLangBannerDismissed(false);
      }
    } catch (e) { /* noop */ }
  }, []);
  const dismissLangBanner = () => {
    try { lsSet('lfhs_lang_banner_dismissed_v1', true); } catch (e) { /* noop */ }
    setLangBannerDismissed(true);
  };

  // -------- Ratings (thumbs up/down per insight) --------
  const [ratings, setRatings] = useState({});
  useEffect(() => { setRatings(lsGet(LS_RATINGS, {})); }, []);
  const handleRate = (id, value) => {
    setRatings(prev => {
      const next = { ...prev };
      if (prev[id] === value) delete next[id]; // toggle off if same value clicked
      else next[id] = value;
      lsSet(LS_RATINGS, next);
      return next;
    });
  };

  // -------- Brief-level helpfulness rating (one per week) --------
  const [briefRatings, setBriefRatings] = useState({});
  useEffect(() => { setBriefRatings(lsGet('lfhs_brief_level_ratings_v1', {})); }, []);
  const briefRating = briefRatings[selectedId];
  const handleBriefRate = (value) => {
    setBriefRatings(prev => {
      const next = { ...prev };
      if (prev[selectedId] === value) delete next[selectedId]; // toggle off if same
      else next[selectedId] = value;
      lsSet('lfhs_brief_level_ratings_v1', next);
      return next;
    });
    try {
      if (typeof window !== 'undefined' && window.plausible) {
        window.plausible(value === 'up' ? 'Brief Rated Helpful' : 'Brief Rated Not Helpful', {
          props: { issue: BRIEFS.find(b => b.id === selectedId)?.issue || 'unknown' }
        });
      }
    } catch (e) { /* noop */ }
  };

  // -------- Bookmarks (saved snapshots) --------
  const [bookmarks, setBookmarks] = useState([]);
  useEffect(() => { setBookmarks(lsGet(LS_BOOKMARKS, [])); }, []);
  const bookmarkIds = useMemo(() => new Set(bookmarks.map(b => b.id)), [bookmarks]);
  const handleBookmark = (briefId, verticalId, idx, insight) => {
    const brief = BRIEFS.find(b => b.id === briefId);
    if (!brief) return;
    const id = insightId(briefId, verticalId, idx);
    setBookmarks(prev => {
      const exists = prev.some(b => b.id === id);
      const next = exists
        ? prev.filter(b => b.id !== id)
        : [...prev, buildBookmarkSnapshot(brief, verticalId, idx, insight)];
      lsSet(LS_BOOKMARKS, next);
      return next;
    });
  };
  const handleUnsave = (id) => {
    setBookmarks(prev => {
      const next = prev.filter(b => b.id !== id);
      lsSet(LS_BOOKMARKS, next);
      return next;
    });
  };

  const brief = useMemo(() => BRIEFS.find(b => b.id === selectedId), [selectedId]);
  const trendingCapped = useMemo(() => (brief.trending || []).slice(0, 3), [brief]);
  const totalInsights = useMemo(
    () => Object.values(brief.verticals).reduce((s, arr) => s + arr.length, 0) + trendingCapped.length,
    [brief, trendingCapped]
  );

  const isSavedView = filter === 'saved';
  const showVerticals = !isSavedView && (filter === 'all' || VERTICALS_META.some(v => v.id === filter));
  const showTrending = !isSavedView && (filter === 'all' || filter === 'trending');
  const showFlags = !isSavedView;
  const showOneBig = !isSavedView;
  const showMetadata = !isSavedView;
  const visibleVerticals = filter === 'all'
    ? VERTICALS_META
    : VERTICALS_META.filter(v => v.id === filter);

  const handlePrint = () => { try { window.print(); } catch (e) { /* noop */ } };

  return (
    <div style={{ background: C.bg, minHeight: '100vh', color: C.ink, fontFamily: "'Inter', system-ui, -apple-system, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; }
        button { font-family: inherit; }

        /* Tile grid — adapts to insight count per editorial layout rules:
           1 → wide single (avoid lonely card), 2 → 50/50, 3 → 3-col,
           4 → 2+2 (two rows of 50/50), 5 → 3+2 (3 top, 2 below at 50/50),
           6 → 3+3 (two full rows). */
        .tile-grid {
          display: grid;
          gap: 12px;
        }
        .tile-grid-3 { grid-template-columns: repeat(3, 1fr); }
        .tile-grid-2 { grid-template-columns: repeat(2, 1fr); }
        /* Single insight: occupies 2 of 3 implicit tracks so it reads substantial without stretching to full page width */
        .tile-grid-1 { grid-template-columns: repeat(3, 1fr); }
        .tile-grid-1 > * { grid-column: span 2; max-width: 560px; }
        /* 4 insights: 2 columns gives two clean rows of 50/50 */
        .tile-grid-4 { grid-template-columns: repeat(2, 1fr); }
        /* 5 insights: 6-column base with 3 cards spanning 2 cols each on row 1 (3+3+3 wait that's 9... using 2+2+2 = 6),
           and 2 cards spanning 3 cols each on row 2 (3+3 = 6). Result: top row 3 cards at ~33% each, bottom row 2 at 50% each. */
        .tile-grid-5 { grid-template-columns: repeat(6, 1fr); }
        .tile-grid-5 > *:nth-child(-n+3) { grid-column: span 2; }
        .tile-grid-5 > *:nth-child(n+4) { grid-column: span 3; }
        /* 6 insights: standard 3-col, wraps to 3+3 */
        .tile-grid-6 { grid-template-columns: repeat(3, 1fr); }
        @media (max-width: 900px) {
          .tile-grid, .tile-grid-1, .tile-grid-2, .tile-grid-3, .tile-grid-4, .tile-grid-5, .tile-grid-6 {
            grid-template-columns: 1fr; gap: 10px;
          }
          .tile-grid-1 > *, .tile-grid-5 > * { grid-column: auto; max-width: none; }
          .tile-outer, .tile-inner, .tile-face { height: auto !important; min-height: 0 !important; overflow: visible !important; }
          .tile-context { -webkit-line-clamp: unset; display: block; }
          .tile-back-clamp { -webkit-line-clamp: unset; display: block; }
        }

        /* Tile shell — content-driven height with same-row equalization via CSS Grid.
           Cards in the same row stretch to match the tallest card in that row,
           but rows do not pad to a fixed minimum, so dead space is eliminated. */
        .tile-outer {
          perspective: 1600px;
          position: relative;
          cursor: pointer;
          min-height: 320px; /* sane floor so very short cards still feel like cards, not chips */
        }
        .tile-inner {
          position: relative;
          width: 100%;
          height: 100%;
          transform-style: preserve-3d;
          transition: transform 0.65s cubic-bezier(0.22,1,0.36,1);
        }
        .tile-face {
          -webkit-backface-visibility: hidden;
          backface-visibility: hidden;
          overflow: hidden;
        }
        /* Headline clamp — caps at 3 lines so cards with very long headlines do not push everything else around. */
        .tile-headline {
          display: -webkit-box;
          -webkit-line-clamp: 3;
          -webkit-box-orient: vertical;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        /* Context line-clamp — caps at 6 lines (~65 words) and trails with an ellipsis.
           No min-height; the card grows to fit the actual content length. */
        .tile-context {
          display: -webkit-box;
          -webkit-line-clamp: 6;
          -webkit-box-orient: vertical;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        /* Back-face context (Competitive Implication / Conversation Starter) gets more room
           since back face is what reps actually use. Allow 8 lines. */
        .tile-back-clamp {
          display: -webkit-box;
          -webkit-line-clamp: 8;
          -webkit-box-orient: vertical;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        /* Front face participates in layout flow so the tile grows to fit content.
           Back face overlays absolutely on flip, scrolls if taller than the front. */
        .tile-front {
          position: relative;
        }
        .tile-back {
          position: absolute;
          inset: 0;
          transform: rotateY(180deg);
          overflow-y: auto; /* if back content is taller than front, allow scroll rather than crop */
        }
        .tile-outer:hover .tile-face:not(.tile-back) {
          box-shadow: 0 4px 14px rgba(20,21,26,0.08);
          border-color: ${C.borderHi};
        }
        .btn-flip:hover { background: ${C.surfaceAlt} !important; border-color: ${C.muteSoft} !important; color: ${C.ink} !important; }
        .btn-article:hover { background: ${C.redInk} !important; border-color: ${C.redInk} !important; }
        .icon-btn:hover { background: ${C.surfaceAlt} !important; }

        @media (max-width: 640px) {
          .brand-desktop { display: none !important; }
          .brand-mobile { display: flex !important; }
          .hero-wrap { padding: 20px 16px 12px !important; }
          .hero-title { font-size: 24px !important; }
          .hero-flex { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
          .content-wrap { padding: 16px 16px 40px !important; }
          .sop-list li { font-size: 13px !important; }
          .flag-row { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }
          .flag-row > div { width: auto !important; }
          .one-big-body { font-size: 13px !important; }
        }

        .filter-chip:hover:not(.active) {
          border-color: ${C.borderHi} !important;
          color: ${C.ink} !important;
          background: ${C.surface} !important;
        }
        .week-option:hover { background: ${C.surfaceAlt} !important; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }

        /* -------- PRINT -------- */
        @media print {
          @page { margin: 0.5in; }
          body { background: ${C.surface} !important; }
          .no-print { display: none !important; }
          /* Flatten flip cards: show front+back stacked, no 3D */
          .tile-outer, .tile-inner, .tile-face { height: auto !important; min-height: 0 !important; overflow: visible !important; position: relative !important; }
          .tile-inner { transform: none !important; transform-style: flat !important; }
          .tile-face { position: relative !important; inset: auto !important; transform: none !important; backface-visibility: visible !important; break-inside: avoid; }
          .tile-context, .tile-back-clamp { -webkit-line-clamp: unset !important; display: block !important; overflow: visible !important; }
          .tile-back { margin-top: 4px; }
          .tile-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
          /* Light-theme the dark panels so toner isn't obliterated */
          .print-light { background: ${C.surface} !important; color: ${C.ink} !important; border-color: ${C.border} !important; }
          .print-light * { color: ${C.ink} !important; }
          /* Page breaks between major sections */
          section { break-inside: avoid; }
          /* Remove shadows and heavy effects */
          * { box-shadow: none !important; }
        }
      `}</style>

                </div>
              )}
            </div>
          <div style={{ position: 'relative' }}>
            <button onClick={() => setWeekPickerOpen(v => !v)}
              style={{
                display: 'inline-flex', alignItems: 'center', gap: 8,
                padding: '9px 14px', background: C.surface,
                border: `1px solid ${C.border}`, borderRadius: 8,
                fontSize: 12, fontWeight: 600, color: C.inkSoft,
                cursor: 'pointer', transition: 'all 0.2s',
              }}>
              <Calendar size={13} strokeWidth={2} /> {brief.weekShort}
              <ChevronDown size={13} strokeWidth={2}
                style={{ transform: weekPickerOpen ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }} />
            </button>
            {weekPickerOpen && (
              <div style={{
                position: 'absolute', top: 'calc(100% + 6px)', right: 0,
                background: C.surface, border: `1px solid ${C.border}`,
                borderRadius: 10, minWidth: 260, zIndex: 20,
                boxShadow: '0 8px 24px rgba(20,21,26,0.1)', overflow: 'hidden',
              }}>
                {BRIEFS.map(b => (
                  <button key={b.id} onClick={() => { setSelectedId(b.id); setWeekPickerOpen(false); setFilter('all'); }}
                    className="week-option"
                    style={{
                      display: 'block', width: '100%', textAlign: 'left',
                      padding: '12px 16px', background: b.id === selectedId ? C.surfaceAlt : 'transparent',
                      border: 'none', borderBottom: `1px solid ${C.border}`,
                      cursor: 'pointer', transition: 'background 0.15s',
                    }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: C.ink }}>{b.issue}</span>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        {b.sampleData && (
                          <span style={{
                            fontSize: 8.5, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase',
                            padding: '2px 6px', borderRadius: 3,
                            background: '#FEF6E7', color: '#8A5A10', border: '1px solid #F4C758',
                          }}>Sample</span>
                        )}
                        {b.id === selectedId && <span style={{ fontSize: 10, color: C.redInk, fontWeight: 700 }}>● CURRENT</span>}
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: C.mute, marginTop: 3 }}>{b.weekRange}</div>
                  </button>
                ))}
              </div>
            )}
          </div>
          </div>
        </div>
      </div>

      {/* ============ SAMPLE DATA BANNER ============ */}
      {brief.sampleData && (
        <div style={{ maxWidth: 1180, margin: '0 auto', padding: '0 32px 14px' }}>
          <div style={{
            background: '#FEF6E7', border: '1px solid #F4C758',
            borderRadius: 8, padding: '10px 14px',
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{
              fontSize: 9.5, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase',
              padding: '3px 8px', borderRadius: 4,
              background: '#B8791A', color: '#FFFFFF',
            }}>
              Sample
            </span>
            <span style={{ fontSize: 12, color: '#8A5A10', lineHeight: 1.5 }}>
              Archive view. Content is illustrative from the prototype period. Live sourced intelligence begins with Issue №16.
            </span>
          </div>
        </div>
      )}

      {/* ============ BRIEF-LEVEL HELPFULNESS + ONE BIG IDEA ============ */}
      <div style={{ maxWidth: 1180, margin: '0 auto', padding: '4px 32px 0' }}>
        {/* Helpful row — single brief-level capture, right-justified, prominent */}
        <div className="no-print" style={{
          display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12,
          marginBottom: 14,
        }}>
          <span style={{
            fontSize: 12.5, fontWeight: 600, color: C.inkSoft,
            letterSpacing: '0.01em',
          }}>
            {briefRating === 'up' ? 'Thanks for the feedback' : briefRating === 'down' ? 'Thanks for the feedback' : 'Was this brief helpful?'}
          </span>
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={() => handleBriefRate('up')} title="Yes, useful"
              className="icon-btn"
              style={{
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                width: 38, height: 34, padding: 0,
                background: briefRating === 'up' ? C.redWash : C.surface,
                border: `1px solid ${briefRating === 'up' ? C.redBorder : C.border}`,
                borderRadius: 6,
                cursor: 'pointer', transition: 'all 0.15s',
              }}>
              <ThumbsUp size={16} strokeWidth={2}
                fill={briefRating === 'up' ? C.redInk : 'none'}
                color={briefRating === 'up' ? C.redInk : C.inkSoft} />
            </button>
            <button onClick={() => handleBriefRate('down')} title="Not useful"
              className="icon-btn"
              style={{
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                width: 38, height: 34, padding: 0,
                background: briefRating === 'down' ? C.surfaceWarm : C.surface,
                border: `1px solid ${briefRating === 'down' ? C.borderHi : C.border}`,
                borderRadius: 6,
                cursor: 'pointer', transition: 'all 0.15s',
              }}>
              <ThumbsDown size={16} strokeWidth={2}
                fill={briefRating === 'down' ? C.inkSoft : 'none'}
                color={briefRating === 'down' ? C.inkSoft : C.inkSoft} />
            </button>
          </div>
        </div>

        {/* One Big Idea — moved to top, replacing the prior State of Play block */}
        <div className="fade-in" style={{
          background: C.surface, border: `2px solid ${C.red}`,
          borderRadius: 12, padding: '22px 26px',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <Target size={14} strokeWidth={2} color={C.redInk} />
            <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: C.redInk }}>
              One Big Idea
            </span>
          </div>
          <h3 style={{ margin: '0 0 10px 0', fontSize: 18, fontWeight: 600, lineHeight: 1.3, letterSpacing: '-0.01em', color: C.ink }}>
            {brief.oneBigIdea.headline}
          </h3>
          <p className="one-big-body" style={{ margin: 0, fontSize: 13.5, lineHeight: 1.65, color: C.inkBody }}>
            {brief.oneBigIdea.body}
          </p>
        </div>
      </div>

      {/* ============ FILTER ============ */}
      <div className="content-wrap" style={{ maxWidth: 1180, margin: '0 auto', padding: '22px 32px 44px' }}>
        <div className="no-print" style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 22, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: C.mute, marginRight: 4, display: 'flex', alignItems: 'center', gap: 5 }}>
            <Filter size={11} strokeWidth={2} /> Filter
          </span>
          {[
            { id: 'all',      label: 'All', icon: null, count: null },
            { id: 'trending', label: 'Trending', icon: Flame, count: null },
            { id: 'saved',    label: 'Saved', icon: Bookmark, count: bookmarks.length },
            ...VERTICALS_META.map(v => ({ id: v.id, label: v.name, icon: null, count: null })),
            { id: 'competitive', label: 'Competitive', icon: Shield, count: null, scrollTo: 'competitive-flags-section' },
          ].map(chip => {
            const active = filter === chip.id;
            const ChipIcon = chip.icon;
            const handleChipClick = () => {
              if (chip.scrollTo) {
                // Ensure flags are visible (not in a saved/filtered view) before scrolling
                if (filter === 'saved') setFilter('all');
                setTimeout(() => {
                  const el = document.getElementById(chip.scrollTo);
                  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, filter === 'saved' ? 80 : 0);
                return;
              }
              setFilter(chip.id);
            };
            return (
              <button key={chip.id} onClick={handleChipClick}
                className={`filter-chip ${active ? 'active' : ''}`}
                style={{
                  display: 'inline-flex', alignItems: 'center', gap: 5,
                  padding: '7px 13px', fontSize: 11.5, fontWeight: 600,
                  border: `1px solid ${active ? C.ink : C.border}`, borderRadius: 999,
                  background: active ? C.ink : C.surfaceAlt,
                  color: active ? C.surface : C.inkSoft,
                  cursor: 'pointer', whiteSpace: 'nowrap',
                  transition: 'all 0.2s',
                }}>
                {ChipIcon && <ChipIcon size={11} strokeWidth={2.5}
                  fill={chip.id === 'saved' && bookmarks.length > 0 ? (active ? C.surface : C.redInk) : 'none'} />}
                {chip.label}
                {chip.count !== null && chip.count > 0 && (
                  <span style={{
                    fontSize: 10, fontWeight: 700,
                    padding: '1px 6px', borderRadius: 999,
                    background: active ? 'rgba(255,255,255,0.2)' : C.redWash,
                    color: active ? C.surface : C.redInk,
                    marginLeft: 2,
                  }}>{chip.count}</span>
                )}
              </button>
            );
          })}
        </div>

        {/* SAVED VIEW */}
        {isSavedView && (
          <SavedInsightsView
            bookmarks={bookmarks}
            ratings={ratings}
            onRate={handleRate}
            onUnsave={handleUnsave}
          />
        )}

        {/* TRENDING SECTION — moved above verticals so reps see cross-vertical patterns first */}
        {showTrending && trendingCapped.length > 0 && (
          <section style={{ marginTop: 0, marginBottom: 28 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14, flexWrap: 'wrap' }}>
              <div style={{
                width: 30, height: 30, borderRadius: 6,
                background: C.blue, color: C.surface,
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}>
                <Flame size={15} strokeWidth={2.5} color={C.surface} />
              </div>
              <h2 style={{
                margin: 0, fontSize: 14, fontWeight: 700,
                letterSpacing: '0.1em', textTransform: 'uppercase', color: C.ink,
              }}>Trending</h2>
              <span style={{
                fontSize: 10.5, padding: '2px 9px', borderRadius: 999,
                background: C.blueWash, color: C.blueInk,
                border: `1px solid ${C.blueBorder}`, fontWeight: 600,
              }}>{trendingCapped.length} {trendingCapped.length === 1 ? 'pattern' : 'patterns'}</span>
              <span style={{ fontSize: 11, color: C.mute, fontStyle: 'italic' }}>
                Cross-vertical patterns from this and recent briefs.
              </span>
            </div>
            <div className={`tile-grid tile-grid-${Math.min(trendingCapped.length, 3)}`}>
              {trendingCapped.map((t, i) => <TrendingTile key={i} item={t} />)}
            </div>
          </section>
        )}

        {/* VERTICAL SECTIONS */}
        {showVerticals && visibleVerticals.map(meta => (
          <VerticalSection
            key={meta.id}
            meta={meta}
            insights={brief.verticals[meta.id]}
            briefId={brief.id}
            bookmarkIds={bookmarkIds}
            ratings={ratings}
            onBookmark={handleBookmark}
            onRate={handleRate}
          />
        ))}

        {/* (Trending section formerly here — now rendered above verticals) */}

        {/* COMPETITIVE FLAGS */}
        {showFlags && (
        <section id="competitive-flags-section" style={{ marginTop: 20, marginBottom: 28, scrollMarginTop: 80 }}>
          <div className="print-light" style={{
            background: C.flagsBg, border: `1px solid ${C.flagsBorder}`,
            borderRadius: 12, overflow: 'hidden', position: 'relative',
            boxShadow: '0 2px 8px rgba(20,21,26,0.12)',
          }}>
            <div style={{
              background: 'repeating-linear-gradient(90deg, rgba(196,18,48,0.4) 0 24px, rgba(196,18,48,0.1) 24px 32px)',
              height: 3,
            }} />
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              gap: 12, padding: '18px 24px',
              borderBottom: `1px solid ${C.flagsBorder}`, flexWrap: 'wrap',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <Shield size={16} strokeWidth={2} color="#FF8A9F" />
                <h2 style={{ margin: 0, fontSize: 14, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: C.flagsText }}>
                  Competitive Flags
                </h2>
              </div>
              <span style={{
                display: 'inline-flex', alignItems: 'center', gap: 5,
                fontSize: 9.5, padding: '3px 9px', borderRadius: 999,
                background: 'rgba(196,18,48,0.15)', color: '#FF8A9F',
                border: '1px solid rgba(196,18,48,0.4)',
                fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase',
              }}>
                <Lock size={9} strokeWidth={2.5} /> Internal only
              </span>
            </div>
            <div style={{ padding: '4px 0' }}>
              {brief.flags.map((f, i) => {
                const ps = PRIORITY_STYLES[f.priority];
                return (
                  <div key={i} className="flag-row" style={{
                    display: 'flex', alignItems: 'center', gap: 16,
                    padding: '14px 24px',
                    borderBottom: i < brief.flags.length - 1 ? `1px solid ${C.flagsBorder}` : 'none',
                  }}>
                    {/* Priority indicator — fixed-width column, dot + label aligned flush */}
                    <div style={{
                      flexShrink: 0, width: 72,
                      display: 'flex', alignItems: 'center', gap: 7,
                    }}>
                      <span style={{
                        width: 8, height: 8, borderRadius: '50%',
                        background: ps.dot, flexShrink: 0,
                        boxShadow: `0 0 0 3px ${ps.bg}`,
                      }} />
                      <span style={{
                        fontSize: 9.5, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase',
                        color: ps.color,
                      }}>{f.priority}</span>
                    </div>
                    {/* Competitor name — fixed-width column so notes align across all rows */}
                    <div style={{ flexShrink: 0, width: 150 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: C.flagsText, letterSpacing: '-0.005em' }}>
                        {f.competitor}
                      </span>
                    </div>
                    {/* Note — fills remaining width */}
                    <p style={{ margin: 0, fontSize: 13, lineHeight: 1.55, color: '#C8CAD0', flex: 1 }}>
                      {f.note}
                    </p>
                  </div>
                );
              })}
            </div>
          </div>
        </section>
        )}

        {/* ONE BIG IDEA — now rendered at top of brief, removed from this position */}

        {/* METADATA */}
        {showMetadata && (
        <section>
          <div style={{
            background: C.surfaceAlt, border: `1px solid ${C.border}`,
            borderRadius: 10, padding: '14px 20px',
          }}>
            <div style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: C.mute, marginBottom: 10 }}>
              Brief Metadata
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 14 }}>
              {[
                ['Date range', brief.weekRange],
                ['Verticals', '5'],
                ['Competitors', '8'],
                ['Processed', brief.metadata.processed],
                ['Delivered', brief.metadata.delivered],
              ].map(([label, val], i) => (
                <div key={i}>
                  <div style={{ fontSize: 9.5, color: C.mute, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 3 }}>{label}</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>{val}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 11, color: C.mute, fontStyle: 'italic', marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.border}` }}>
              {brief.metadata.dedup}
            </div>
          </div>
          <div style={{ textAlign: 'center', marginTop: 18, fontSize: 10, color: C.muteSoft, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 600 }}>
            Life Fitness / Hammer Strength · Competitive Intelligence · Confidential
          </div>
        </section>
        )}
      </div>
    </div>
  );
}



const rootEl = document.getElementById('root');
const initialLoader = document.getElementById('initial-loader');
if (initialLoader) initialLoader.remove();
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(IntelBrief));
</script>
</body>
</html>
